<svg xmlns="http://www.w3.org/2000/svg" width="780" height="400" viewBox="0 0 780 400" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="780" height="400" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="390" y="21" fill="#8b949e" text-anchor="middle">anylock — twelve lockfile formats, one NDJSON schema</text>

  <text x="24" y="64" fill="#7ee787">$ anylock package-lock.json Cargo.lock go.sum requirements.txt</text>

  <text x="24" y="94" fill="#c9d1d9">{"schema":1,"name":"ms","version":"2.1.3","ecosystem":<tspan fill="#79c0ff">"npm"</tspan>,</text>
  <text x="24" y="112" fill="#c9d1d9"> "purl":<tspan fill="#a5d6ff">"pkg:npm/ms@2.1.3"</tspan>,"integrity":[{"algorithm":"sha512",…}],</text>
  <text x="24" y="130" fill="#c9d1d9"> "relation":<tspan fill="#3fb950">"direct"</tspan>,"scopes":[],"source":{"format":"npm",…}}</text>

  <text x="24" y="160" fill="#c9d1d9">{"schema":1,"name":"itoa","version":"1.0.11","ecosystem":<tspan fill="#ffa657">"cargo"</tspan>,</text>
  <text x="24" y="178" fill="#c9d1d9"> "purl":<tspan fill="#a5d6ff">"pkg:cargo/itoa@1.0.11"</tspan>,"integrity":[{"algorithm":"sha256",…}],…}</text>

  <text x="24" y="208" fill="#c9d1d9">{"schema":1,"name":"github.com/google/uuid","ecosystem":<tspan fill="#79c0ff">"golang"</tspan>,</text>
  <text x="24" y="226" fill="#c9d1d9"> "purl":<tspan fill="#a5d6ff">"pkg:golang/github.com/google/uuid@v1.6.0"</tspan>,"relation":<tspan fill="#d29922">"unknown"</tspan>,…}</text>

  <text x="24" y="256" fill="#c9d1d9">{"schema":1,"name":"httpx","version":"0.27.0","ecosystem":<tspan fill="#f778ba">"pypi"</tspan>,</text>
  <text x="24" y="274" fill="#c9d1d9"> "purl":<tspan fill="#a5d6ff">"pkg:pypi/httpx@0.27.0"</tspan>,"integrity":[{"algorithm":"sha256",…}],…}</text>

  <text x="24" y="308" fill="#7ee787">$ anylock stats pnpm-lock.yaml Gemfile.lock composer.lock</text>
  <text x="24" y="330" fill="#c9d1d9">pnpm-lock.yaml   <tspan fill="#79c0ff">pnpm</tspan>      npm       3 packages</text>
  <text x="24" y="348" fill="#c9d1d9">Gemfile.lock     <tspan fill="#f85149">gemfile</tspan>   gem       8 packages</text>
  <text x="24" y="366" fill="#c9d1d9">composer.lock    <tspan fill="#d2a8ff">composer</tspan>  composer  3 packages</text>

  <text x="24" y="392" fill="#8b949e">one schema · sorted · byte-stable · zero dependencies · fully offline</text>
</svg>
